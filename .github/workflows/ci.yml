name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@628ddcba0c89d4a1eb687830f28e0b2fda46888b # stable
        with:
          toolchain: "1.85"
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@628ddcba0c89d4a1eb687830f28e0b2fda46888b # stable
        with:
          toolchain: "1.85"
      - run: cargo test --workspace -- --test-threads=1

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@628ddcba0c89d4a1eb687830f28e0b2fda46888b # stable
        with:
          toolchain: "1.85"
          components: clippy
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@628ddcba0c89d4a1eb687830f28e0b2fda46888b # stable
        with:
          toolchain: "1.85"
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@628ddcba0c89d4a1eb687830f28e0b2fda46888b # stable
        with:
          toolchain: "1.85"
      - run: cargo install cargo-audit
      - run: cargo audit

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@628ddcba0c89d4a1eb687830f28e0b2fda46888b # stable
        with:
          toolchain: "1.85"
      - run: cargo build --release -p kn-code-cli
      - run: sha256sum target/release/kn-code > target/release/kn-code.sha256
        if: runner.os == 'Linux'
      - run: shasum -a 256 target/release/kn-code > target/release/kn-code.sha256
        if: runner.os == 'macOS'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kn-code-${{ matrix.os }}
          path: target/release/kn-code*
          retention-days: 30

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: docker build -t kn-code .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: kn-code
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
